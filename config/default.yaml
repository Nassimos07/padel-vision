# Default detector configuration for padel-vision.
# Load it with padel_vision.config.Config.from_yaml(path).

detector:
  backend: rfdetr          # "rfdetr" (Roboflow, players) or "yolo" (Ultralytics)
  model: medium            # rfdetr: nano|small|medium|base|large  ·  yolo: yolo11{n,s,m,l}.pt
  confidence: 0.50         # minimum detection confidence
  iou: 0.50                # YOLO NMS threshold (ignored by RF-DETR)
  imgsz: 640               # YOLO inference size (ignored by RF-DETR)
  device: null             # null => auto (cuda if available, else cpu)
  detect_ball: false       # ball is tiny/fast — deferred to a dedicated later stage

annotation:
  show_labels: true
  show_confidence: true
