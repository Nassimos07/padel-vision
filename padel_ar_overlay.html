<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Padel Analytics — AR Tracking Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070b;
    --hud-glass:#0b1018;
    --hud-stroke:rgba(255,255,255,.14);
    --ink:#f4f7fb;
    --ink-dim:rgba(244,247,251,.55);
    --live:#37e0c8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:28px 18px}
  .stage{position:relative;width:min(1100px,96vw);aspect-ratio:1463/812;
    border-radius:14px;overflow:hidden;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);
    background:#000}
  .stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  /* faint vignette so neon overlay pops over the bright court */
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%,transparent 55%,rgba(2,4,8,.34) 100%);
    mix-blend-mode:multiply}
  svg.overlay{position:absolute;inset:0;width:100%;height:100%;overflow:visible}

  /* entrance: discs + cards animate in, staggered */
  .player{opacity:0;animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;
    animation-delay:var(--d,0s)}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .hud{opacity:0;animation:rise .6s ease forwards .05s}

  .caption{width:min(1100px,96vw);display:flex;justify-content:space-between;
    gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-dim)}
  .caption b{color:var(--ink);font-weight:600}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:11px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%}
  @media (prefers-reduced-motion:reduce){
    .player,.hud{animation:none;opacity:1}
  }
</style>
</head>

<script>
/* ----------------------------------------------------------------------
   PADEL AR OVERLAY — parametric annotation layer
   Every annotation is derived from one data record per player.
   Translating to Python: keep feet/head in image pixels, redraw the
   same primitives (ellipse, dotted line, rounded rect + text) with
   PIL/OpenCV, or rasterize this SVG group with cairosvg over each frame.
---------------------------------------------------------------------- */
const PLAYERS = [
  // id   team color      feet(x,y)     head(x,y)     rx  ry  speed   state       move(dx,dy)
  {id:'P1',team:'A',color:'#FF3D8B',feet:[468,792],head:[455,648],rx:74,ry:28,speed:'18.4',state:'SPRINT',  move:[-0.55,-1]},
  {id:'P2',team:'A',color:'#FFB020',feet:[958,778],head:[958,636],rx:74,ry:28,speed:'12.1',state:'COVER',   move:[0.35,-1]},
  {id:'P3',team:'B',color:'#27E08A',feet:[646,332],head:[646,232],rx:46,ry:16,speed:'6.7', state:'NET',     move:null},
  {id:'P4',team:'B',color:'#2E9BFF',feet:[800,252],head:[800,150],rx:42,ry:15,speed:'9.3', state:'STRIKE',  move:[0.2,1]},
];

const NS='http://www.w3.org/2000/svg';
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const ov = document.getElementById('ov');

function el(tag,attrs={},parent){
  const n=document.createElementNS(NS,tag);
  for(const k in attrs) n.setAttribute(k,attrs[k]);
  if(parent) parent.appendChild(n);
  return n;
}
// approximate ellipse circumference (Ramanujan) for dash math
function ellipseLen(a,b){return Math.PI*(3*(a+b)-Math.sqrt((3*a+b)*(a+3*b)));}
function smil(parent,attrs){ if(RM) return; el('animate',attrs,parent); }

/* ---------- defs: per-player glow filter + floor gradient ---------- */
const defs = el('defs',{},ov);
PLAYERS.forEach(p=>{
  const f=el('filter',{id:'glow-'+p.id,x:'-60%',y:'-60%',width:'220%',height:'220%'},defs);
  el('feGaussianBlur',{stdDeviation:5,result:'b'},f);
  const g=el('radialGradient',{id:'floor-'+p.id,cx:'50%',cy:'50%',r:'50%'},defs);
  el('stop',{offset:'0%','stop-color':p.color,'stop-opacity':'0'},g);
  el('stop',{offset:'62%','stop-color':p.color,'stop-opacity':'.10'},g);
  el('stop',{offset:'100%','stop-color':p.color,'stop-opacity':'.34'},g);
});
// soft drop shadow for cards
const ds=el('filter',{id:'cardshadow',x:'-40%',y:'-40%',width:'180%',height:'180%'},defs);
el('feDropShadow',{dx:0,dy:6,stdDeviation:8,'flood-color':'#000','flood-opacity':'.55'},ds);

/* ---------------------------- HUD ---------------------------- */
function buildHUD(){
  const g=el('g',{class:'hud'},ov);
  el('rect',{x:20,y:20,width:316,height:66,rx:12,fill:'rgba(11,16,24,.72)',
    stroke:'rgba(255,255,255,.14)','stroke-width':1,filter:'url(#cardshadow)'},g);
  // live dot
  const dot=el('circle',{cx:42,cy:44,r:5,fill:'var(--live)'},g);
  smil(dot,{attributeName:'opacity',values:'1;.25;1',dur:'1.6s',repeatCount:'indefinite'});
  const ring=el('circle',{cx:42,cy:44,r:5,fill:'none',stroke:'var(--live)','stroke-width':1.5,opacity:.7},g);
  smil(ring,{attributeName:'r',values:'5;13',dur:'1.6s',repeatCount:'indefinite'});
  smil(ring,{attributeName:'opacity',values:'.7;0',dur:'1.6s',repeatCount:'indefinite'});

  el('text',{x:58,y:40,fill:'#fff','font-family':"'JetBrains Mono',monospace",
    'font-size':15,'font-weight':700,'letter-spacing':'2.5'},g).textContent='PADEL ANALYTICS';
  el('text',{x:58,y:40,dx:0},g); // spacer noop
  el('text',{x:58,y:62,fill:'rgba(244,247,251,.55)','font-family':"'Inter',sans-serif",
    'font-size':11,'font-weight':600,'letter-spacing':'2'},g).textContent='LIVE TRACKING';
  el('text',{x:316,y:62,'text-anchor':'end',fill:'var(--live)',
    'font-family':"'JetBrains Mono',monospace",'font-size':12,'font-weight':500,
    'letter-spacing':'1.5'},g).textContent='4 / 4 LOCKED';
  el('text',{x:316,y:40,'text-anchor':'end',fill:'#fff',
    'font-family':"'JetBrains Mono',monospace",'font-size':14,'font-weight':500},g).textContent='00:02.0';
}

/* ----------------------- per-player annotation ----------------------- */
function buildPlayer(p,i){
  const g=el('g',{class:'player',style:`--d:${0.25+i*0.12}s`},ov);
  const [fx,fy]=p.feet, [hx,hy]=p.head;

  /* 1) presence column: floor -> torso node (dotted, recedes in 3D) */
  el('line',{x1:fx,y1:fy,x2:hx,y2:hy+8,stroke:p.color,'stroke-width':1.5,
    'stroke-dasharray':'1 7','stroke-linecap':'round',opacity:.45},g);

  /* 2) GROUND DISC ----------------------------------------------------- */
  // soft floor glow fill
  el('ellipse',{cx:fx,cy:fy,rx:p.rx,ry:p.ry,fill:`url(#floor-${p.id})`},g);
  // blurred halo ring
  const halo=el('ellipse',{cx:fx,cy:fy,rx:p.rx,ry:p.ry,fill:'none',
    stroke:p.color,'stroke-width':5,filter:`url(#glow-${p.id})`,opacity:.5},g);
  smil(halo,{attributeName:'opacity',values:'.30;.65;.30',dur:'2.6s',
    begin:`${i*0.4}s`,repeatCount:'indefinite'});
  // crisp base ring
  el('ellipse',{cx:fx,cy:fy,rx:p.rx,ry:p.ry,fill:'none',stroke:p.color,
    'stroke-width':2,opacity:.9},g);
  // calibration ticks around the rim
  const ticks=12;
  for(let t=0;t<ticks;t++){
    const a=(t/ticks)*Math.PI*2;
    const x1=fx+Math.cos(a)*p.rx, y1=fy+Math.sin(a)*p.ry;
    const x2=fx+Math.cos(a)*(p.rx+ (Math.abs(Math.cos(a))*6+3)),
          y2=fy+Math.sin(a)*(p.ry+ (Math.abs(Math.sin(a))*3+1.5));
    el('line',{x1,y1,x2,y2,stroke:p.color,'stroke-width':1,opacity:.35},g);
  }
  // traveling sensor-sweep dash on the rim
  const L=ellipseLen(p.rx,p.ry);
  const seg=L*0.16;
  const sweep=el('ellipse',{cx:fx,cy:fy,rx:p.rx,ry:p.ry,fill:'none',
    stroke:'#ffffff','stroke-width':2.4,'stroke-linecap':'round',
    'stroke-dasharray':`${seg} ${L-seg}`,opacity:.85},g);
  smil(sweep,{attributeName:'stroke-dashoffset',from:L,to:0,
    dur:'3s',repeatCount:'indefinite'});
  // center pip
  el('circle',{cx:fx,cy:fy,r:2,fill:p.color},g);

  /* optional movement vector */
  if(p.move){
    const m=p.move, ml=Math.hypot(m[0],m[1]);
    const ux=m[0]/ml, uy=m[1]/ml;
    const len=p.rx*0.95;
    const ex=fx+ux*len, ey=fy+uy*p.ry*1.7; // squash vertical for ground plane
    el('line',{x1:fx,y1:fy,x2:ex,y2:ey,stroke:p.color,'stroke-width':2.2,
      'stroke-linecap':'round',opacity:.8},g);
    // arrowhead
    const ah=7, ang=Math.atan2(ey-fy,ex-fx);
    el('path',{d:`M${ex},${ey} L${ex-Math.cos(ang-0.5)*ah},${ey-Math.sin(ang-0.5)*ah} `+
      `L${ex-Math.cos(ang+0.5)*ah},${ey-Math.sin(ang+0.5)*ah} Z`,fill:p.color,opacity:.85},g);
  }

  /* 3) torso node */
  el('circle',{cx:hx,cy:hy+8,r:7,fill:'none',stroke:p.color,'stroke-width':1.5,opacity:.85},g);
  el('circle',{cx:hx,cy:hy+8,r:2.5,fill:p.color},g);

  /* 4) TRACKING CARD --------------------------------------------------- */
  const cw=156, ch=54, cx=hx-cw/2, cyBottom=hy-20, cy=cyBottom-ch;
  // tether from card pointer to torso node
  el('line',{x1:hx,y1:cyBottom+10,x2:hx,y2:hy+8,stroke:p.color,'stroke-width':1.5,opacity:.7},g);
  // pointer triangle
  el('path',{d:`M${hx-7},${cyBottom} L${hx+7},${cyBottom} L${hx},${cyBottom+10} Z`,
    fill:'rgba(11,16,24,.92)'},g);
  // card body
  el('rect',{x:cx,y:cy,width:cw,height:ch,rx:9,fill:'rgba(11,16,24,.86)',
    stroke:'rgba(255,255,255,.12)','stroke-width':1,filter:'url(#cardshadow)'},g);
  // left accent bar
  el('rect',{x:cx,y:cy+1,width:4,height:ch-2,rx:2,fill:p.color},g);
  // big ID
  el('text',{x:cx+18,y:cy+35,fill:'#fff','font-family':"'JetBrains Mono',monospace",
    'font-size':24,'font-weight':700,'letter-spacing':'0.5'},g).textContent=p.id;
  // divider
  el('line',{x1:cx+66,y1:cy+10,x2:cx+66,y2:cy+ch-10,stroke:'rgba(255,255,255,.12)','stroke-width':1},g);
  // state
  el('text',{x:cx+cw-14,y:cy+22,'text-anchor':'end',fill:p.color,
    'font-family':"'Inter',sans-serif",'font-size':11,'font-weight':700,
    'letter-spacing':'1.5'},g).textContent=p.state;
  // speed value + unit
  const sp=el('text',{x:cx+cw-14,y:cy+43,'text-anchor':'end',fill:'#fff',
    'font-family':"'JetBrains Mono',monospace",'font-size':17,'font-weight':700},g);
  sp.textContent=p.speed;
  const unit=el('tspan',{fill:'rgba(244,247,251,.5)','font-size':10,'font-weight':500},sp);
  unit.textContent=' km/h';
}

buildHUD();
PLAYERS.forEach(buildPlayer);
</script>
